name: Login to Telegram

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Phone with country code (+989123456789)'
        required: true
        type: string
      code:
        description: 'Code (empty=get code, "resend"=SMS/call, or enter code)'
        required: false
        type: string
      password:
        description: '2FA password (if enabled)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest
        run: git pull origin main || git pull origin master || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install telethon

      - name: Login
        run: python login.py "${{ github.event.inputs.phone }}" "${{ github.event.inputs.code }}" "${{ github.event.inputs.password }}"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add session.dat phone_hash.json 2>/dev/null || true
          git commit -m "Session update" || echo "No changes"
          git push
