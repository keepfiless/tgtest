name: Login to Telegram

on:
  workflow_dispatch:
    inputs:
      phone:
        description: 'Phone with country code (+989123456789)'
        required: true
        type: string
      code:
        description: 'Code (empty=get code, "resend"=SMS/call, or enter code)'
        required: false
        type: string
      password:
        description: '2FA password (if enabled)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore hash cache
        uses: actions/cache/restore@v4
        with:
          path: phone_hash.json
          key: phone-hash-${{ github.event.inputs.phone }}-
          restore-keys: |
            phone-hash-${{ github.event.inputs.phone }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install telethon

      - name: Debug - Show files before
        run: |
          echo "Files before login:"
          ls -la
          cat phone_hash.json 2>/dev/null || echo "No hash file yet"

      - name: Login
        run: python login.py "${{ github.event.inputs.phone }}" "${{ github.event.inputs.code }}" "${{ github.event.inputs.password }}"

      - name: Debug - Show files after
        run: |
          echo "Files after login:"
          ls -la
          cat phone_hash.json 2>/dev/null || echo "No hash file"

      - name: Save hash cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: phone_hash.json
          key: phone-hash-${{ github.event.inputs.phone }}-${{ github.run_id }}

      - name: Commit session
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f session.dat 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Session update"
          git push || echo "Nothing to push"
